name: Build release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-windows.txt

      - name: Set package version
        shell: powershell
        run: |
          $refName = "${{ github.ref_name }}"
          if ($refName.StartsWith("v")) { $version = $refName.TrimStart("v") } else { $version = "1.0.0" }
          (Get-Content gpt_desktop\version.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content gpt_desktop\version.py
          (Get-Content installer\GPTLocalToolbox.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content installer\GPTLocalToolbox.iss

      - name: Build executable
        shell: powershell
        run: python -m PyInstaller --clean --noconfirm --distpath dist --workpath build GPTLocalToolbox_windows.spec

      - name: Bundle Microsoft VC++ Runtime
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force installer\redist | Out-Null
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "installer\redist\VC_redist.x64.exe"

      - name: Build Setup.exe
        shell: powershell
        run: |
          Copy-Item dist\GPTLocalToolbox.exe GPTLocalToolbox.exe -Force
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /O"." /F"GPTLocalToolbox_Setup" "installer\GPTLocalToolbox.iss"
          $refName = "${{ github.ref_name }}"
          if ($refName.StartsWith("v")) { $version = $refName.TrimStart("v") } else { $version = "manual" }
          Copy-Item GPTLocalToolbox_Setup.exe "GPTLocalToolbox_Setup_v${version}_windows_x64.exe" -Force

      - name: Sign Windows installer
        shell: powershell
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ($env:WINDOWS_SIGNING_PFX_BASE64) {
            $refName = "${{ github.ref_name }}"
            if ($refName.StartsWith("v")) { $version = $refName.TrimStart("v") } else { $version = "manual" }
            python scripts\release_signing.py --sign-windows "GPTLocalToolbox_Setup_v${version}_windows_x64.exe"
          } else {
            Write-Host "Windows signing skipped: no signing certificate configured."
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: GPTLocalToolbox_Setup_v*_windows_x64.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GPTLocalToolbox_Setup_v*_windows_x64.exe

  macos:
    name: macOS app (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: intel
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate macOS signing secrets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          MAC_NOTARY_APPLE_ID: ${{ secrets.MAC_NOTARY_APPLE_ID }}
          MAC_NOTARY_TEAM_ID: ${{ secrets.MAC_NOTARY_TEAM_ID }}
          MAC_NOTARY_PASSWORD: ${{ secrets.MAC_NOTARY_PASSWORD }}
        run: |
          missing=0
          for name in \
            MAC_CERTIFICATE_P12_BASE64 \
            MAC_CERTIFICATE_PASSWORD \
            MAC_CODESIGN_IDENTITY \
            MAC_NOTARY_APPLE_ID \
            MAC_NOTARY_TEAM_ID \
            MAC_NOTARY_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required for tagged macOS releases."
              missing=1
            fi
          done
          if [[ "$missing" != "0" ]]; then
            echo "::error::Tagged macOS releases must be Developer ID signed and notarized so downloaded apps open normally."
            exit 1
          fi

      - name: Import macOS signing certificate
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: macos-signing-${{ github.run_id }}-${{ matrix.arch }}
        run: |
          if [[ -z "$MAC_CERTIFICATE_P12_BASE64" ]]; then
            echo "Mac certificate import skipped: no certificate configured."
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          export CERTIFICATE_PATH
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(
              base64.b64decode(os.environ["MAC_CERTIFICATE_P12_BASE64"])
          )
          PY

          security create-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          ORIGINAL_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIGINAL_KEYCHAINS
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-windows.txt

      - name: Check macOS dependency compatibility
        run: |
          python - <<'PY'
          import PySide6
          parts = []
          for piece in PySide6.__version__.split(".")[:2]:
              try:
                  parts.append(int(piece))
              except ValueError:
                  parts.append(0)
          version = tuple(parts + [0, 0])[:2]
          if version >= (6, 10):
              raise SystemExit(f"PySide6 {PySide6.__version__} requires newer macOS than this app target.")
          print(f"Using PySide6 {PySide6.__version__} for macOS package.")
          PY

      - name: Set package version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="1.0.0"; fi
          python - <<PY
          import re
          from pathlib import Path
          version = "$VERSION"
          files = [
              Path("gpt_desktop/version.py"),
              Path("GPTLocalToolbox.spec"),
          ]
          for path in files:
              text = path.read_text(encoding="utf-8")
              if path.name == "version.py":
                  text = re.sub(r'APP_VERSION = ".*"', f'APP_VERSION = "{version}"', text)
              else:
                  text = re.sub(r'app_version = ".*"', f'app_version = "{version}"', text)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Build app
        run: python -m PyInstaller --clean --noconfirm GPTLocalToolbox.spec

      - name: Sign macOS app
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          MAC_ENTITLEMENTS_PATH: packaging/macos.entitlements
        run: |
          if [[ -z "$MAC_CODESIGN_IDENTITY" ]]; then
            echo "Mac signing skipped: no Developer ID identity configured."
          else
            python3 scripts/release_signing.py --sign-macos "dist/GPTLocalToolbox.app"
          fi

      - name: Package macOS dmg
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="manual"; fi
          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R "dist/GPTLocalToolbox.app" "dmg-root/"
          ln -s /Applications "dmg-root/Applications"
          hdiutil create -volname "GPT 本地工具箱" -srcfolder "dmg-root" -ov -format UDZO "GPTLocalToolbox_v${VERSION}_macos_${{ matrix.arch }}.dmg"

      - name: Sign macOS dmg
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$MAC_CODESIGN_IDENTITY" ]]; then
            echo "Mac DMG signing skipped: no Developer ID identity configured."
          else
            if [[ "$GITHUB_REF_NAME" == v* ]]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="manual"; fi
            python3 scripts/release_signing.py --sign-macos-dmg "GPTLocalToolbox_v${VERSION}_macos_${{ matrix.arch }}.dmg"
          fi

      - name: Notarize macOS dmg
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          MAC_NOTARY_APPLE_ID: ${{ secrets.MAC_NOTARY_APPLE_ID }}
          MAC_NOTARY_TEAM_ID: ${{ secrets.MAC_NOTARY_TEAM_ID }}
          MAC_NOTARY_PASSWORD: ${{ secrets.MAC_NOTARY_PASSWORD }}
        run: |
          if [[ -z "$MAC_CODESIGN_IDENTITY" || -z "$MAC_NOTARY_APPLE_ID" || -z "$MAC_NOTARY_TEAM_ID" || -z "$MAC_NOTARY_PASSWORD" ]]; then
            echo "Mac notarization skipped: no Apple notarization credentials configured."
          else
            if [[ "$GITHUB_REF_NAME" == v* ]]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="manual"; fi
            python3 scripts/release_signing.py --notarize-macos "GPTLocalToolbox_v${VERSION}_macos_${{ matrix.arch }}.dmg"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: GPTLocalToolbox_v*_macos_${{ matrix.arch }}.dmg

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GPTLocalToolbox_v*_macos_${{ matrix.arch }}.dmg

      - name: Clean macOS signing keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
