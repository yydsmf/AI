name: Build release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-windows.txt

      - name: Set package version
        shell: powershell
        run: |
          $refName = "${{ github.ref_name }}"
          if ($refName.StartsWith("v")) { $version = $refName.TrimStart("v") } else { $version = "1.0.0" }
          (Get-Content gpt_desktop\version.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content gpt_desktop\version.py
          (Get-Content installer\GPTLocalToolbox.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content installer\GPTLocalToolbox.iss

      - name: Build executable
        shell: powershell
        run: python -m PyInstaller --clean --noconfirm --distpath dist --workpath build GPTLocalToolbox_windows.spec

      - name: Bundle Microsoft VC++ Runtime
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force installer\redist | Out-Null
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "installer\redist\VC_redist.x64.exe"

      - name: Build Setup.exe
        shell: powershell
        run: |
          Copy-Item dist\GPTLocalToolbox.exe GPTLocalToolbox.exe -Force
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /O"." /F"GPTLocalToolbox_Setup" "installer\GPTLocalToolbox.iss"
          $refName = "${{ github.ref_name }}"
          if ($refName.StartsWith("v")) { $version = $refName.TrimStart("v") } else { $version = "manual" }
          Copy-Item GPTLocalToolbox_Setup.exe "GPTLocalToolbox_Setup_v${version}_windows_x64.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: GPTLocalToolbox_Setup_v*_windows_x64.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GPTLocalToolbox_Setup_v*_windows_x64.exe

  macos:
    name: macOS app (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: intel
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements-windows.txt

      - name: Set package version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="1.0.0"; fi
          python - <<PY
          import re
          from pathlib import Path
          version = "$VERSION"
          files = [
              Path("gpt_desktop/version.py"),
              Path("GPTLocalToolbox.spec"),
          ]
          for path in files:
              text = path.read_text(encoding="utf-8")
              if path.name == "version.py":
                  text = re.sub(r'APP_VERSION = ".*"', f'APP_VERSION = "{version}"', text)
              else:
                  text = re.sub(r'app_version = ".*"', f'app_version = "{version}"', text)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Build app
        run: python -m PyInstaller --clean --noconfirm GPTLocalToolbox.spec

      - name: Package app zip
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="manual"; fi
          ditto -c -k --keepParent "dist/GPTLocalToolbox.app" "GPTLocalToolbox_v${VERSION}_macos_${{ matrix.arch }}.app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-app
          path: GPTLocalToolbox_v*_macos_${{ matrix.arch }}.app.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GPTLocalToolbox_v*_macos_${{ matrix.arch }}.app.zip
